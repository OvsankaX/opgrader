<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPGRADOR V25 — плавная рулетка 60fps</title>
    <style>
        :root {
            --bg: #0a0a12; --panel: #13131f; --accent: #a855f7;
            --accent2: #7c3aed;
            --accent-glow: rgba(168, 85, 247, 0.75);
            --accent-glow2: rgba(124, 58, 237, 0.5);
            --win: #34d399; --loss: #f87171; --radius: 12px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* === TOAST === */
        #toast-container {
            position: fixed; top: 10px; right: 10px;
            width: 48%; max-width: 220px;
            display: flex; flex-direction: column; gap: 8px; z-index: 9999;
        }
        @keyframes slideInRight  { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0);    opacity: 1; } }
        @keyframes slideOutRight { from { transform: translateX(0);    opacity: 1; } to { transform: translateX(50px); opacity: 0; } }
        .toast {
            background: rgba(19,19,31,0.97); border-left: 4px solid var(--accent);
            padding: 10px 13px; border-radius: 8px; color: #fff; font-weight: 600; font-size: 0.82rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5), 0 0 12px var(--accent-glow);
            display: flex; justify-content: space-between; align-items: center;
            animation: slideInRight 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
            backdrop-filter: blur(5px);
        }
        .toast.removing { animation: slideOutRight 0.3s cubic-bezier(0.55,0,1,0.45) forwards; }

        header {
            height: 60px; background: #07070f; display: flex; align-items: center;
            padding: 0 15px; border-bottom: 1px solid #1e1e35; flex-shrink: 0; position: relative;
        }
        .header-logo {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 1.1rem; color: var(--accent);
            letter-spacing: 2px; text-transform: uppercase;
            text-shadow: 0 0 12px var(--accent-glow), 0 0 24px var(--accent-glow2);
        }
        .nav-btn { font-size: 1.4rem; cursor: pointer; z-index: 10; padding: 5px; }
        .balance-box { margin-left: auto; display: flex; align-items: center; gap: 6px; font-weight: bold; z-index: 10; font-size: 1rem; color: #fff; }
        #bal { color: var(--accent); font-size: 1.05rem; }

        main { flex-grow: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; align-items: center; position: relative; }
        .container { display: none; width: 100%; max-width: 400px; }

        @keyframes slideFromLeft  { from { transform: translateX(-60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideFromRight { from { transform: translateX(60px);  opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .anim-from-left  { animation: slideFromLeft  0.28s cubic-bezier(0.22,1,0.36,1) forwards; }
        .anim-from-right { animation: slideFromRight 0.28s cubic-bezier(0.22,1,0.36,1) forwards; }

        /* === DONUT WHEEL === */
        .wheel-outer { width: 100%; display: flex; justify-content: center; margin: 15px 0; }
        .wheel-container { position: relative; width: 240px; height: 240px; }
        #donut-canvas { position: absolute; top: 0; left: 0; width: 240px; height: 240px; }

        .wheel-inner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 168px; height: 168px; border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #1a1030, #0a0a16);
            border: 1px solid #2a1f45;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.7), 0 0 18px rgba(168,85,247,0.12);
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            z-index: 5;
        }

        .center-stat { text-align: center; }
        #pct-view    { font-size: 2.3rem; font-weight: 900; color: #fff; }
        #status-msg  { height: 36px; font-size: 1.5rem; font-weight: 900; margin-top: 4px; text-transform: uppercase; }

        #particle-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }

        .btn-row { display: flex; width: 100%; gap: 6px; margin-bottom: 8px; }

        .opt-btn { background: #13131f; border: 1px solid #2a2a45; color: #ccc; padding: 12px 2px; border-radius: 10px; flex: 1; font-weight: bold; font-size: 0.85rem; cursor: pointer; transition: 0.2s; }
        .opt-btn.active { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); color: #fff; }

        .action-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            border: none; border-radius: var(--radius); color: #fff;
            font-size: 1.1rem; font-weight: 900; margin: 5px 0 15px 0;
            box-shadow: 0 0 0 0 var(--accent-glow);
            cursor: pointer; transition: box-shadow 0.2s, opacity 0.2s, background 0.2s;
        }
        .action-btn:not(:disabled) { box-shadow: 0 4px 18px var(--accent-glow); }
        .action-btn:disabled { background: #1e1e30; opacity: 0.42; cursor: default; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; padding-bottom: 4px; }

        .item-frame {
            border: 1px solid #2a2a45; border-radius: var(--radius); padding: 12px;
            background: linear-gradient(145deg, #13131f, #0e0e1a);
            text-align: center; cursor: pointer; transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .item-frame.selected { border-color: var(--accent); box-shadow: 0 0 14px var(--accent-glow), 0 0 28px rgba(168,85,247,0.15); }
        .price { font-weight: bold; color: var(--win); margin-top: 4px; }

        /* === PROFILE CARD === */
        .prof-card {
            background: linear-gradient(145deg, #13131f, #0e0e1a);
            border: 1px solid #2a2a45; border-radius: 15px; padding: 20px;
            text-align: left; margin-bottom: 15px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.5);
        }
        .field-label     { font-size: 0.9rem; font-weight: 800; color: #fff; opacity: 1; text-transform: uppercase; letter-spacing: 1.5px; }
        .prof-row        { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
        #prof-nick        { font-size: 1.15rem; font-weight: 900; color: var(--accent); }
        #prof-bal-display { font-size: 1.4rem;  font-weight: 900; color: var(--accent); }
        #prof-ups-display { font-size: 1.3rem;  font-weight: 900; color: var(--accent); }
        .prof-total-val   { font-size: 2rem;    font-weight: 900; margin: 2px 0 6px; }
        .prof-sub-line    { display: flex; gap: 12px; font-size: 0.9rem; font-weight: 700; }

        .sell-btn {
            background: #13131f; border: 1px solid #2a2a45; color: #fff;
            padding: 12px 2px; border-radius: 10px; flex: 1; font-weight: bold; font-size: 0.85rem;
            cursor: pointer; transition: 0.2s;
        }
        .sell-btn:hover { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }

        /* === INVENTORY FRAME === */
        .inv-frame {
            background: linear-gradient(145deg, #13131f, #0e0e1a);
            border: 1px solid #2a2a45; border-radius: var(--radius);
            overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }
        .inv-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; }
        .inv-frame-label {
            font-size: 0.78rem; font-weight: 800; color: #fff;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .inv-balance-badge {
            font-size: 0.82rem; font-weight: 800; color: #fff;
            background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25);
            border-radius: 8px; padding: 4px 10px;
        }
        .inv-divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, #3a2a6a 20%, #6d3aed 50%, #3a2a6a 80%, transparent);
        }
        .inv-grid-wrap { padding: 12px; }

        /* === MODAL === */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.88);
            display: none; align-items: center; justify-content: center;
            z-index: 8000; padding: 20px; backdrop-filter: blur(6px);
        }
        #modal-overlay.visible { display: flex; }
        @keyframes modalIn  { from { transform: scale(0.72); opacity: 0; } to { transform: scale(1);    opacity: 1; } }
        @keyframes modalOut { from { transform: scale(1);    opacity: 1; } to { transform: scale(0.72); opacity: 0; } }
        .modal-card {
            background: linear-gradient(145deg, #1a1a2e, #13131f);
            border: 2px solid var(--accent); border-radius: 15px; padding: 25px;
            width: 100%; max-width: 320px; text-align: center;
            box-shadow: 0 0 30px var(--accent-glow), 0 0 60px rgba(168,85,247,0.1);
            animation: modalIn 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        .modal-card.closing { animation: modalOut 0.18s cubic-bezier(0.55,0,1,0.45) forwards; }

        /* === AUTH === */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .win-glow  { color: var(--win);  text-shadow: 0 0 20px var(--win),  0 0 40px var(--win); }
        .loss-glow { color: var(--loss); text-shadow: 0 0 20px var(--loss), 0 0 40px rgba(248,113,113,0.4); }
        #p-shop h3 { margin-bottom: 15px; text-align: center; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="modal-overlay">
    <div class="modal-card" id="modal-card">
        <p id="modal-text" style="margin-bottom:20px;font-size:1.1rem;font-weight:bold;"></p>
        <div style="display:flex;gap:10px;">
            <button class="opt-btn" style="background:#222;" onclick="closeModal(false)">ОТМЕНА</button>
            <button class="opt-btn" style="background:linear-gradient(135deg,var(--accent2),var(--accent));box-shadow:0 0 10px var(--accent-glow);" onclick="closeModal(true)">ДА</button>
        </div>
    </div>
</div>

<div id="auth-screen">
    <div style="background:linear-gradient(145deg,#1a1a2e,#13131f);padding:25px;border-radius:15px;border:1px solid var(--accent);box-shadow:0 0 30px var(--accent-glow);width:280px;text-align:center;">
        <h2 style="color:var(--accent);margin-bottom:15px;text-shadow:0 0 15px var(--accent-glow);">UPGRADOR</h2>
        <input type="text" id="user-in" placeholder="Твой ник..." style="width:100%;padding:12px;background:#07070f;border:1px solid #2a2a45;color:#fff;border-radius:8px;margin-bottom:15px;text-align:center;outline:none;">
        <button class="action-btn" style="margin:0" onclick="login()">ВОЙТИ</button>
    </div>
</div>

<header>
    <div class="nav-btn" onclick="showPage('shop')">🛒</div>
    <div class="header-logo" onclick="showPage('main')">UPGRADOR</div>
    <div class="balance-box"><span id="bal">0</span> ₴ <div class="nav-btn" onclick="showPage('profile')">👤</div></div>
</header>

<main>
    <canvas id="particle-canvas"></canvas>

    <div id="p-main" class="container" style="display:block;">
        <div class="wheel-outer">
            <div class="wheel-container">
                <canvas id="donut-canvas" width="240" height="240"></canvas>
                <div class="wheel-inner">
                    <div class="center-stat">
                        <h2 id="pct-view">10%</h2>
                        <div id="status-msg"></div>
                    </div>
                </div>
                <!-- Стрелка курcора с улучшенным свечением -->
                <svg id="cursor-svg" style="position:absolute;inset:0;width:240px;height:240px;z-index:20;pointer-events:none;" viewBox="0 0 240 240">
                    <line id="cursor-line-svg" x1="120" y1="5" x2="120" y2="35"
                        stroke="white" stroke-width="4" stroke-linecap="round"
                        style="filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 4px #a855f7) drop-shadow(0 0 6px #7c3aed);
                               transform-origin:120px 120px; transform:rotate(0deg);
                               transition: none;"/>
                </svg>
            </div>
        </div>
        <div class="btn-row">
            <button class="opt-btn bc x-ctrl" id="m2"  onclick="setM(2,'m2')">X2</button>
            <button class="opt-btn bc x-ctrl" id="m4"  onclick="setM(4,'m4')">X4</button>
            <button class="opt-btn bc x-ctrl" id="m10" onclick="setM(10,'m10')">X10</button>
        </div>
        <div class="btn-row">
            <button class="opt-btn bc x-ctrl" id="c35" onclick="setChance(35,'c35')">35%</button>
            <button class="opt-btn bc x-ctrl" id="c55" onclick="setChance(55,'c55')">55%</button>
            <button class="opt-btn bc x-ctrl" id="c75" onclick="setChance(75,'c75')">75%</button>
        </div>
        <button class="action-btn" id="go-btn" onclick="startSpin()" disabled>ПРОКРУТИТЬ</button>
        <div class="inv-frame">
            <div class="inv-header">
                <span class="inv-frame-label">ИНВЕНТАРЬ</span>
                <span class="inv-balance-badge" id="inv-main-balance">0 ₴</span>
            </div>
            <div class="inv-divider"></div>
            <div class="inv-grid-wrap"><div id="inv-main" class="grid"></div></div>
        </div>
    </div>

    <div id="p-shop" class="container">
        <h3>МАГАЗИН</h3>
        <div style="display:flex;gap:8px;margin-bottom:15px;">
            <input type="number" id="budget" placeholder="Мин. цена..." style="flex:1;padding:12px;background:#07070f;border:1px solid #2a2a45;color:#fff;border-radius:8px;outline:none;">
            <button class="opt-btn" style="flex:0.4" onclick="refreshShop()">ПОИСК</button>
        </div>
        <div id="shop-grid" class="grid" style="padding-bottom:10px;"></div>
        <button class="action-btn" id="buy-btn" onclick="askBuy()" disabled>КУПИТЬ ВЫБРАННОЕ</button>
    </div>

    <div id="p-profile" class="container">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:15px;">
            <h3>ПРОФИЛЬ</h3>
        </div>
        <div class="prof-card">
            <div class="prof-row">
                <div class="field-label">НИК:</div>
                <div id="prof-nick">-</div>
            </div>
            <div class="prof-row">
                <div class="field-label">БАЛАНС:</div>
                <div id="prof-bal-display">0 ₴</div>
            </div>
            <div class="prof-row">
                <div class="field-label">АПГРЕЙДОВ:</div>
                <div id="prof-ups-display">0</div>
            </div>
            <div class="field-label" style="margin-top: 8px; margin-bottom: 2px;">ИСТОРИЯ БАЛАНСА:</div>
            <div id="prof-total" class="prof-total-val">0 ₴</div>
            <div class="prof-sub-line" id="prof-sub-stats"></div>
        </div>
        <div class="btn-row">
            <button class="sell-btn" onclick="askSellSelected()">ПРОДАТЬ ВЫБОР</button>
            <button class="sell-btn" onclick="askSellAll()">ПРОДАТЬ ВСЁ</button>
        </div>
        <div class="inv-frame" style="margin-top:10px;">
            <div class="inv-header">
                <span class="inv-frame-label">ИНВЕНТАРЬ</span>
                <span class="inv-balance-badge" id="inv-balance-display">0 ₴</span>
            </div>
            <div class="inv-divider"></div>
            <div class="inv-grid-wrap"><div id="inv-prof" class="grid"></div></div>
        </div>
    </div>
</main>

<script>
// --------------------- Плавные анимации 60fps ---------------------
const donutC = document.getElementById('donut-canvas');
const dCtx   = donutC.getContext('2d');
const CX=120, CY=120, R=90, RING=24;

let donutCurrent=10, donutTarget=10, donutAnim=null;

function drawDonutRaw(pct) {
    dCtx.clearRect(0,0,240,240);
    dCtx.beginPath();
    dCtx.arc(CX,CY,R,0,Math.PI*2);
    dCtx.strokeStyle='#181828';
    dCtx.lineWidth=RING;
    dCtx.lineCap='butt';
    dCtx.stroke();
    if(pct<=0) return;
    const bottom    = Math.PI/2;
    const halfSweep = (pct/100)*Math.PI;
    const arcStart  = bottom - halfSweep;
    const arcEnd    = bottom + halfSweep;
    dCtx.save();
    dCtx.beginPath();
    dCtx.arc(CX,CY,R,arcStart,arcEnd);
    dCtx.strokeStyle='rgba(168,85,247,0.22)';
    dCtx.lineWidth=RING+14;
    dCtx.lineCap='butt';
    dCtx.stroke();
    dCtx.restore();
    const grad=dCtx.createLinearGradient(CX,CY+R,CX,CY-R);
    grad.addColorStop(0,'#5b21b6');
    grad.addColorStop(0.5,'#a855f7');
    grad.addColorStop(1,'#e9d5ff');
    dCtx.beginPath();
    dCtx.arc(CX,CY,R,arcStart,arcEnd);
    dCtx.strokeStyle=grad;
    dCtx.lineWidth=RING;
    dCtx.lineCap='butt';
    dCtx.stroke();
}

function animateDonut(target) {
    donutTarget=target;
    if(donutAnim) return;
    let start=null;
    const from=donutCurrent;
    const dur=420;
    function step(now){
        if(!start) start=now;
        const t=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-t,3);
        donutCurrent=from+(target-from)*ease;
        drawDonutRaw(donutCurrent);
        if(t<1){ donutAnim=requestAnimationFrame(step); }
        else { donutCurrent=target; drawDonutRaw(target); donutAnim=null; }
    }
    donutAnim=requestAnimationFrame(step);
}
drawDonutRaw(10);

// СТРЕЛКА (курсор) с плавным вращением и свечением
const cursorLine = document.getElementById('cursor-line-svg');
let cursorCurrentDeg = 0;
function setCursorDeg(deg) { 
    cursorLine.style.transform = `rotate(${deg}deg)`; 
}

// Частицы (взрыв)
const canvas = document.getElementById('particle-canvas');
const ctx    = canvas.getContext('2d');
let particles=[];
function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
resizeCanvas(); window.addEventListener('resize',resizeCanvas);

function spawnExplosion(){
    const wc=document.querySelector('.wheel-container'), rect=wc.getBoundingClientRect();
    const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
    for(let i=0;i<120;i++){
        const a=Math.random()*Math.PI*2, s=1.5+Math.random()*7;
        particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,
            size:Math.random()*5+2,
            color:Math.random()>0.4?'#a855f7':(Math.random()>0.5?'#34d399':'#c084fc'),
            gravity:0.06});
    }
}
function updateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=p.gravity; p.vx*=0.99; p.life-=0.007;
        if(p.life<=0){particles.splice(i,1);continue;}
        ctx.globalAlpha=p.life; ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha=1; requestAnimationFrame(updateParticles);
}
updateParticles();

// Плавное изменение чисел
const _numAnims = {};
function animateNumber(elId, target, suffix='', prefix='') {
    const el = document.getElementById(elId); if(!el) return;
    const from = parseFloat(el.dataset.val??'0');
    el.dataset.val = target;
    if(_numAnims[elId]) cancelAnimationFrame(_numAnims[elId]);
    if(from===target){ el.innerText=prefix+Math.round(target)+suffix; return; }
    let start=null, dur=480;
    function step(now){
        if(!start) start=now;
        const t=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-t,3);
        const cur=from+(target-from)*ease;
        el.innerText=prefix+Math.round(cur)+suffix;
        if(t<1) _numAnims[elId]=requestAnimationFrame(step);
        else { el.innerText=prefix+Math.round(target)+suffix; delete _numAnims[elId]; }
    }
    _numAnims[elId]=requestAnimationFrame(step);
}

// Сообщения
function toast(text){
    const c=document.getElementById('toast-container');
    const el=document.createElement('div'); el.className='toast';
    el.innerHTML=`<span>${text}</span><span style="cursor:pointer;padding-left:10px;opacity:0.6" onclick="removeToast(this.parentElement)">×</span>`;
    c.appendChild(el);
    setTimeout(()=>removeToast(el),3200);
}
function removeToast(el){
    if(!el||el.classList.contains('removing'))return;
    el.classList.add('removing');
    setTimeout(()=>el&&el.remove(),300);
}

let pendingAction=null;
function openModal(text,action){
    document.getElementById('modal-text').innerText=text;
    const card=document.getElementById('modal-card');
    card.classList.remove('closing');
    card.style.animation='none'; void card.offsetWidth; card.style.animation='';
    document.getElementById('modal-overlay').classList.add('visible');
    pendingAction=action;
}
function closeModal(confirm){
    const card=document.getElementById('modal-card');
    card.classList.add('closing');
    setTimeout(()=>{
        document.getElementById('modal-overlay').classList.remove('visible');
        card.classList.remove('closing');
    },180);
    if(confirm&&pendingAction) pendingAction();
    pendingAction=null;
}

const ITEMS_POOL=["Зуб","Мозг","Чип","Ключ","Сердце","Почка","Диск","Кольцо"];
let user={name:"",bal:1000,inv:[],stats:{ups:0,lost:0,earned:0}};
let chance=10,selected=new Set(),spinning=false;

function login(){
    const n=document.getElementById('user-in').value.trim(); if(!n)return;
    const saved=localStorage.getItem('upg_v25_'+n);
    if(saved) user=JSON.parse(saved); else{ user.name=n; user.inv=[{id:1,n:"Кейс",p:100}]; user.stats={ups:0,lost:0,earned:0}; }
    document.getElementById('auth-screen').style.display='none';
    // добавляем баланс и статы, если их нет в старом сохранении
    if(user.stats===undefined) user.stats={ups:0,lost:0,earned:0};
    if(user.bal===undefined) user.bal=1000;
    update();
}

function update(){
    animateNumber('bal', Math.floor(user.bal));
    document.getElementById('prof-nick').innerText=user.name;
    animateNumber('prof-bal-display', Math.floor(user.bal), ' ₴');
    animateNumber('prof-ups-display', user.stats.ups);
    const inv=user.inv.reduce((a,b)=>a+b.p,0);
    animateNumber('inv-balance-display', inv, ' ₴');
    animateNumber('inv-main-balance', inv, ' ₴');
    renderInv('inv-main',true); renderInv('inv-prof',false);
    renderStats();
    document.getElementById('go-btn').disabled=(selected.size===0||spinning);
    localStorage.setItem('upg_v25_'+user.name,JSON.stringify(user));
}

function renderStats(){
    const total=user.stats.earned-user.stats.lost;
    const tEl=document.getElementById('prof-total');
    const prevVal=parseFloat(tEl.dataset.val??'0');
    tEl.dataset.val=total;
    if(_numAnims['prof-total']) cancelAnimationFrame(_numAnims['prof-total']);
    let start=null,dur=500;
    function step(now){
        if(!start)start=now;
        const t=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-t,3);
        const cur=Math.round(prevVal+(total-prevVal)*ease);
        tEl.innerText=(cur>=0?'+':'')+cur+' ₴';
        tEl.style.color=cur>=0?'var(--win)':'var(--loss)';
        if(t<1)_numAnims['prof-total']=requestAnimationFrame(step);
        else{tEl.innerText=(total>=0?'+':'')+total+' ₴';tEl.style.color=total>=0?'var(--win)':'var(--loss)';delete _numAnims['prof-total'];}
    }
    _numAnims['prof-total']=requestAnimationFrame(step);
    document.getElementById('prof-sub-stats').innerHTML=
        `<span style="color:var(--win)">+${user.stats.earned}</span>
         <span style="opacity:0.3">|</span>
         <span style="color:var(--loss)">-${user.stats.lost}</span>`;
}

function renderInv(id,single){
    const g=document.getElementById(id); if(!g)return; g.innerHTML='';
    user.inv.forEach(i=>{
        const d=document.createElement('div');
        d.className=`item-frame ${selected.has(i.id)?'selected':''}`;
        d.innerHTML=`<b>${i.n}</b><div class="price">${i.p} ₴</div>`;
        d.onclick=()=>{
            if(spinning)return;
            if(single){let was=selected.has(i.id);selected.clear();if(!was)selected.add(i.id);}
            else{if(selected.has(i.id))selected.delete(i.id);else selected.add(i.id);}
            update();
        };
        g.appendChild(d);
    });
}

function setChance(c,id){
    if(spinning)return;
    chance=c;
    animateDonut(c);
    const el=document.getElementById('pct-view');
    const from=parseInt(el.dataset.val??'10');
    el.dataset.val=c;
    if(_numAnims['pct-view']) cancelAnimationFrame(_numAnims['pct-view']);
    let start=null,dur=420;
    function step(now){
        if(!start)start=now;
        const t=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-t,3);
        const cur=Math.round(from+(c-from)*ease);
        el.innerText=cur+'%';
        if(t<1) _numAnims['pct-view']=requestAnimationFrame(step);
        else { el.innerText=c+'%'; delete _numAnims['pct-view']; }
    }
    _numAnims['pct-view']=requestAnimationFrame(step);
    document.querySelectorAll('.bc').forEach(b=>b.classList.remove('active'));
    if(id)document.getElementById(id).classList.add('active');
}
function setM(m,id){ setChance(Math.floor(100/m),id); }

// === Плавное вращение стрелки ===
function startSpin(){
    if(spinning||selected.size!==1)return;
    spinning=true;
    document.getElementById('go-btn').disabled=true;
    document.getElementById('status-msg').innerText='';
    document.getElementById('status-msg').className='';
    document.querySelectorAll('.x-ctrl').forEach(b=>b.disabled=true);
    const item=user.inv.find(x=>x.id===[...selected][0]);
    let start=null, dur=3200, rot=1800+(Math.random()*360), sAng=cursorCurrentDeg % 360;
    
    function animate(now){
        if(!start)start=now;
        const t=Math.min((now-start)/dur,1);
        const ease=1-Math.pow(1-t,4);
        const deg=sAng + ease * rot;
        cursorCurrentDeg=deg;
        setCursorDeg(deg % 360);
        if(t<1) requestAnimationFrame(animate);
        else finish(deg % 360, item);
    }
    requestAnimationFrame(animate);
}

function finish(deg,item){
    spinning=false; user.stats.ups++;
    document.querySelectorAll('.x-ctrl').forEach(b=>b.disabled=false);
    const winSize=(chance/100)*360;
    // зона победы: центр в 180 градусах
    const win=(deg>=(180-winSize/2-1.0) && deg<=(180+winSize/2+1.0));
    const msg=document.getElementById('status-msg');
    if(win){
        const profit=Math.floor(item.p*(100/chance))-item.p;
        item.p+=profit; 
        if(item.n.startsWith("★ ")) item.n=item.n.replace("★ ","");
        else item.n="★ "+item.n;
        user.stats.earned+=profit;
        msg.innerText="УСПЕХ"; msg.className="win-glow"; spawnExplosion();
    } else {
        user.stats.lost+=item.p;
        user.inv=user.inv.filter(x=>x.id!==item.id);
        // ИЗМЕНЕНИЕ: НЕУДАЧА → НЕ БЕДА
        msg.innerText="НЕ БЕДА"; msg.className="loss-glow";
    }
    selected.clear(); update();
}

let shopItems=[];
function refreshShop(){
    const b=parseInt(document.getElementById('budget').value)||20;
    shopItems=Array.from({length:6},(_,i)=>({
        id:'s'+i, n:ITEMS_POOL[Math.floor(Math.random()*ITEMS_POOL.length)],
        p:Math.floor(b+Math.random()*b*0.5), sel:false
    }));
    const g=document.getElementById('shop-grid'); g.innerHTML='';
    shopItems.forEach(i=>{
        const d=document.createElement('div'); d.className='item-frame';
        d.innerHTML=`<b>${i.n}</b><div class="price">${i.p} ₴</div>`;
        d.onclick=()=>{i.sel=!i.sel;d.classList.toggle('selected');updateBuyBtn();};
        g.appendChild(d);
    });
    updateBuyBtn();
}
function updateBuyBtn(){ document.getElementById('buy-btn').disabled=!shopItems.some(i=>i.sel); }
function askBuy(){
    let sel=shopItems.filter(i=>i.sel);
    if(!sel.length){toast("ВЫБЕРИ ПРЕДМЕТЫ!");return;}
    let cost=sel.reduce((a,b)=>a+b.p,0);
    openModal(`КУПИТЬ ЗА ${cost} ₴?`,()=>{
        if(user.bal<cost){toast("МАЛО ДЕНЕГ!");return;}
        sel.forEach(i=>{user.bal-=i.p;user.inv.push({...i,id:Date.now()+Math.random()});});
        toast(`КУПЛЕНО НА ${cost} ₴`); refreshShop(); update();
    });
}
function askSellSelected(){
    let sel=user.inv.filter(i=>selected.has(i.id)); if(!sel.length)return;
    let cost=sel.reduce((a,b)=>a+b.p,0);
    openModal(`ПРОДАТЬ ЗА ${cost} ₴?`,()=>{
        user.inv=user.inv.filter(i=>!selected.has(i.id));
        user.bal+=cost; toast(`ПРОДАНО ЗА ${cost} ₴`);
        selected.clear(); update();
    });
}
function askSellAll(){
    if(!user.inv.length)return;
    let cost=user.inv.reduce((a,b)=>a+b.p,0);
    openModal(`ПРОДАТЬ ВСЁ ЗА ${cost} ₴?`,()=>{
        user.bal+=cost; user.inv=[]; toast(`ПРОДАНО ВСЁ ЗА ${cost} ₴`); update();
    });
}
const PAGE_ORDER={main:1,shop:0,profile:2};
let currentPage='main';
function showPage(p){
    if(spinning)return;
    const prevOrder=PAGE_ORDER[currentPage], nextOrder=PAGE_ORDER[p];
    const prev=document.getElementById('p-'+currentPage); if(prev)prev.style.display='none';
    const next=document.getElementById('p-'+p);
    if(next){
        next.style.display='block';
        next.classList.remove('anim-from-left','anim-from-right');
        void next.offsetWidth;
        next.classList.add(nextOrder<prevOrder?'anim-from-left':'anim-from-right');
    }
    currentPage=p; selected.clear(); update();
}
// Инициализация
window.onload = () => {
    // автостарт анимации частиц
    updateParticles();
}
</script>
