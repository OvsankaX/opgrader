<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPGRADOR MOBILE</title>
    <style>
        :root {
            --bg: #0d0d0d;
            --panel: #1a1a1a;
            --accent: #a020f0;
            --accent-glow: rgba(160, 32, 240, 0.4);
            --white: #efefef;
            --win: #00ff88;
            --loss: #ff4d4d;
            --radius: 15px;
        }

        * { box-sizing: border-box; font-family: 'Arial', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--white); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Auth */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: var(--panel); padding: 30px; border-radius: var(--radius); border: 2px solid var(--accent); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 10px; outline: none; }

        /* Header */
        header { 
            height: 60px; background: #111; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; border-bottom: 1px solid #222; flex-shrink: 0;
        }
        .header-logo { font-weight: 900; font-size: 1rem; color: var(--accent); letter-spacing: 2px; }
        .nav-btn { font-size: 1.4rem; cursor: pointer; }
        .balance-box { display: flex; align-items: center; gap: 10px; font-weight: bold; }

        /* Main Content */
        main { flex-grow: 1; overflow-y: auto; padding: 15px; padding-bottom: 80px; }
        .container { display: none; width: 100%; max-width: 500px; margin: 0 auto; }

        /* Roulette Zone */
        .upgrade-section { display: flex; flex-direction: column; align-items: center; }
        .wheel-container { 
            position: relative; width: 280px; height: 280px; 
            margin: 20px 0; border-radius: 50%; border: 8px solid #1a1a1a;
            background: radial-gradient(circle, #151515, #000); overflow: hidden;
        }
        #wheel-fill { 
            position: absolute; bottom: 0; width: 100%; background: var(--accent); 
            box-shadow: 0 0 40px var(--accent-glow); transition: height 0.3s ease; 
        }
        #cursor-line {
            position: absolute; width: 6px; height: 30px; background: #fff;
            border-radius: 10px; top: 10px; left: calc(50% - 3px);
            transform-origin: 50% 130px; z-index: 10; box-shadow: 0 0 15px #fff;
        }
        .center-stat {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 5; pointer-events: none;
        }
        #status-msg { height: 20px; font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        /* Particles */
        #p-canvas { position: absolute; inset: 0; z-index: 11; pointer-events: none; }

        /* Buttons & Grid */
        .btn-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 15px 0; }
        .opt-btn { background: #222; border: 1px solid #333; color: #fff; padding: 10px 15px; border-radius: 8px; min-width: 60px; font-weight: bold; }
        .action-btn { 
            width: 100%; padding: 18px; background: var(--accent); border: none; 
            border-radius: var(--radius); color: #fff; font-size: 1.2rem; font-weight: bold;
            box-shadow: 0 5px 15px var(--accent-glow); margin-top: 10px;
        }
        .action-btn:disabled { opacity: 0.5; box-shadow: none; }

        .item-frame {
            border: 2px solid #222; border-radius: var(--radius); padding: 15px;
            background: var(--panel); text-align: center; transition: 0.2s;
        }
        .item-frame.selected { border-color: var(--accent); background: #201030; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .price { color: var(--win); font-weight: bold; margin-top: 5px; }

        /* Stats in profile */
        .stats-card { background: #111; border-radius: var(--radius); padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="color:var(--accent); margin-bottom: 15px;">ОПГРЕЙДОР</h1>
            <input type="text" id="user-in" placeholder="Твой ник">
            <input type="password" id="pass-in" placeholder="Пароль">
            <button class="action-btn" onclick="login()">ВОЙТИ</button>
        </div>
    </div>

    <header>
        <div class="nav-btn" onclick="showPage('shop')">🛒</div>
        <div class="header-logo">ОПГРЕЙДОР</div>
        <div class="balance-box">
            <span id="bal">0</span> ₴
            <div class="nav-btn" onclick="showPage('profile')">👤</div>
        </div>
    </header>

    <main>
        <!-- Главная -->
        <div id="p-main" class="container" style="display: block;">
            <div class="upgrade-section">
                <div class="wheel-container">
                    <canvas id="p-canvas"></canvas>
                    <div id="wheel-fill" style="height: 10%;"></div>
                    <div id="cursor-line"></div>
                    <div class="center-stat">
                        <h2 id="pct-view" style="font-size: 2.5rem;">10%</h2>
                        <div id="status-msg"></div>
                    </div>
                </div>

                <div class="btn-grid">
                    <button class="opt-btn" onclick="setM(2)">x2</button>
                    <button class="opt-btn" onclick="setM(4)">x4</button>
                    <button class="opt-btn" onclick="setM(10)">x10</button>
                    <button class="opt-btn" onclick="setChance(35)">35%</button>
                    <button class="opt-btn" onclick="setChance(55)">55%</button>
                    <button class="opt-btn" onclick="setChance(85)">85%</button>
                </div>

                <button class="action-btn" id="go-btn" onclick="startSpin()">ПРОКАЧАТЬ</button>

                <div style="width: 100%; margin-top: 30px;">
                    <h3 style="margin-bottom: 10px;">Твой инвентарь:</h3>
                    <div id="inv-main" class="grid"></div>
                </div>
            </div>
        </div>

        <!-- Магазин -->
        <div id="p-shop" class="container">
            <h2 style="margin-bottom: 15px;">МАГАЗИН ХЛАМА</h2>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="budget" placeholder="Бюджет ₴" style="margin:0;">
                <button class="opt-btn" onclick="refreshShop()">ПОИСК</button>
            </div>
            <div id="shop-grid" class="grid"></div>
            <button class="action-btn" onclick="buyAllSelected()">КУПИТЬ ВЫБРАННОЕ</button>
            <button class="opt-btn" style="width:100%; margin-top:10px;" onclick="showPage('main')">НАЗАД</button>
        </div>

        <!-- Профиль -->
        <div id="p-profile" class="container">
            <h2>ПРОФИЛЬ</h2>
            <div id="stat-box" class="stats-card"></div>
            <div class="btn-grid">
                <button class="opt-btn" onclick="sellSelected()">ПРОДАТЬ ВЫБРАННОЕ</button>
                <button class="opt-btn" onclick="sellAll()">ПРОДАТЬ ВСЕ</button>
            </div>
            <div id="inv-prof" class="grid"></div>
            <button class="action-btn" onclick="showPage('main')">НАЗАД</button>
        </div>
    </main>

    <script>
        const ITEMS = ["Сифилис", "Герпес", "Почка соседа", "Девственность", "Правое яйцо", "Печень алкоголика", "Мамкина заначка", "Хромосома", "Золотой зуб", "Сердце бывшего", "Мозг хлебушка"];
        
        let user = {
            name: "", bal: 1000, inv: [],
            stats: { ups: 0, lost: 0, earned: 0, best: {n: "-", p: 0} }
        };

        let chance = 10;
        let selected = new Set();
        let spinning = false;

        function login() {
            const n = document.getElementById('user-in').value;
            if(!n) return;
            const s = localStorage.getItem('upg_v3_'+n);
            if(s) user = JSON.parse(s);
            else {
                user.name = n;
                user.inv = [{id:1, n:"Твои яйца", p:100}, {id:2, n:"Аппендикс", p:50}];
            }
            document.getElementById('auth-screen').style.display='none';
            update();
        }

        function save() { localStorage.setItem('upg_v3_'+user.name, JSON.stringify(user)); }

        function update() {
            document.getElementById('bal').innerText = Math.floor(user.bal);
            renderInv('inv-main', true);
            renderInv('inv-prof', false);
            renderStats();
            save();
        }

        function renderInv(id, single) {
            const g = document.getElementById(id); g.innerHTML = '';
            user.inv.forEach(i => {
                const d = document.createElement('div');
                d.className = `item-frame ${selected.has(i.id) ? 'selected' : ''}`;
                d.innerHTML = `<div>${i.n}</div><div class="price">${i.p} ₴</div>`;
                d.onclick = () => {
                    if(single) selected.clear(); 
                    if(selected.has(i.id)) selected.delete(i.id);
                    else selected.add(i.id);
                    update();
                };
                g.appendChild(d);
            });
        }

        function renderStats() {
            document.getElementById('stat-box').innerHTML = `
                Игрок: <b>${user.name}</b><br>
                Апгрейдов: ${user.stats.ups}<br>
                Слито: <span style="color:var(--loss)">${user.stats.lost} ₴</span><br>
                Заработано: <span style="color:var(--win)">${user.stats.earned} ₴</span><br>
                Топ дроп: ${user.stats.best.n} (${user.stats.best.p} ₴)
            `;
        }

        function showPage(p) {
            ['main','shop','profile'].forEach(x => document.getElementById('p-'+x).style.display='none');
            document.getElementById('p-'+p).style.display='block';
            selected.clear();
            if(p === 'shop') refreshShop();
            update();
        }

        function setChance(c) {
            if(spinning) return;
            chance = c;
            document.getElementById('wheel-fill').style.height = c + '%';
            document.getElementById('pct-view').innerText = c + '%';
        }
        function setM(m) { setChance(Math.floor(100/m)); }

        function startSpin() {
            if(spinning || selected.size !== 1) return;
            spinning = true;
            document.getElementById('go-btn').disabled = true;
            document.getElementById('status-msg').innerText = '';

            const itId = [...selected][0];
            const idx = user.inv.findIndex(x => x.id === itId);
            const item = user.inv[idx];

            let start = Date.now();
            const dur = 6000;
            const targetRot = 1800 + Math.random()*360; // 5 кругов + рандом

            function animate() {
                let t = (Date.now() - start) / dur;
                if(t > 1) t = 1;

                // Сложная кривая: медленно -> быстро -> медленно
                let ease = t < 0.2 ? 2.5 * t * t : 1 - Math.pow(1 - t, 3); 
                // Упростим для JS плавности
                let currentRot = ease * targetRot;

                document.getElementById('cursor-line').style.transform = `rotate(${currentRot}deg)`;

                if(t < 1) requestAnimationFrame(animate);
                else finish(currentRot % 360, item, idx);
            }
            animate();
        }

        function finish(deg, item, idx) {
            spinning = false;
            document.getElementById('go-btn').disabled = false;

            // Зона выигрыша (внизу круга, т.к. фиолетовое растет снизу)
            const zoneWidth = (chance / 100) * 180;
            const isWin = (deg >= 180 - zoneWidth && deg <= 180 + zoneWidth);
            const msg = document.getElementById('status-msg');

            if(isWin) {
                const profit = Math.floor(item.p * (100/chance)) - item.p;
                const newP = item.p + profit;
                user.inv[idx] = {id: Date.now(), n: "★ " + item.n, p: newP};
                user.stats.earned += profit;
                if(newP > user.stats.best.p) user.stats.best = {n: user.inv[idx].n, p: newP};
                msg.innerText = "ПОБЕДА"; msg.style.color = "var(--win)";
                boom();
            } else {
                user.stats.lost += item.p;
                user.inv.splice(idx, 1);
                msg.innerText = "НЕ БЕДА"; msg.style.color = "var(--loss)";
            }
            user.stats.ups++;
            selected.clear();
            update();
        }

        function boom() {
            const canvas = document.getElementById('p-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 280; canvas.height = 280;
            let particles = [];
            for(let i=0; i<50; i++) {
                particles.push({
                    x: 140, y: 140,
                    vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
                    r: Math.random()*3+2, l: 1
                });
            }
            function draw() {
                ctx.clearRect(0,0,280,280);
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.l -= 0.005; // Медленное исчезновение
                    ctx.fillStyle = `rgba(160, 32, 240, ${p.l})`;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, 7); ctx.fill();
                    if(p.l <= 0) particles.splice(i, 1);
                });
                if(particles.length > 0) requestAnimationFrame(draw);
            }
            draw();
        }

        // Shop logic
        let shopPool = [];
        function refreshShop() {
            const b = parseInt(document.getElementById('budget').value) || 200;
            shopPool = [];
            for(let i=0; i<6; i++) {
                shopPool.push({id: 's'+i, n: ITEMS[Math.floor(Math.random()*ITEMS.length)], p: Math.floor(b * (0.5 + Math.random()))});
            }
            const g = document.getElementById('shop-grid'); g.innerHTML = '';
            shopPool.forEach(i => {
                const d = document.createElement('div');
                d.className = `item-frame ${selected.has(i.id) ? 'selected' : ''}`;
                d.innerHTML = `<div>${i.n}</div><div class="price">${i.p} ₴</div>`;
                d.onclick = () => {
                    if(selected.has(i.id)) selected.delete(i.id); else selected.add(i.id);
                    refreshShopUI();
                };
                g.appendChild(d);
            });
        }
        function refreshShopUI() {
            const cards = document.querySelectorAll('#shop-grid .item-frame');
            shopPool.forEach((item, i) => {
                cards[i].className = `item-frame ${selected.has(item.id) ? 'selected' : ''}`;
            });
        }
        function buyAllSelected() {
            let cost = 0; let count = 0;
            shopPool.forEach(i => { if(selected.has(i.id)) { cost += i.p; count++; } });
            if(cost > user.bal) return alert("Грошей нема!");
            if(count === 0) return;
            user.bal -= cost;
            shopPool.forEach(i => { if(selected.has(i.id)) user.inv.push({id: Date.now()+Math.random(), n: i.n, p: i.p}); });
            selected.clear();
            showPage('main');
        }

        function sellSelected() {
            user.inv = user.inv.filter(i => {
                if(selected.has(i.id)) { user.bal += i.p; return false; }
                return true;
            });
            selected.clear(); update();
        }
        function sellAll() {
            user.inv.forEach(i => user.bal += i.p);
            user.inv = []; selected.clear(); update();
        }
    </script>
</body>
</html>
