<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UPGRADOR V12 NO SCAM</title>
    <style>
        :root {
            --bg: #0a0a0a; --panel: #161616; --accent: #a020f0;
            --win: #00ff88; --loss: #ff3e3e; --radius: 12px;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 60px; background: #000; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #222; flex-shrink: 0; position: relative; }
        .header-logo { position: absolute; left: 50%; transform: translateX(-50%); font-weight: 900; font-size: 1.2rem; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; }
        .balance-box { margin-left: auto; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        main { flex-grow: 1; overflow-y: auto; padding: 10px 15px; display: flex; flex-direction: column; align-items: center; }
        .container { display: none; width: 100%; max-width: 450px; }
        .wheel-container { position: relative; width: 260px; height: 260px; margin: 10px 0 20px 0; border-radius: 50%; border: 8px solid #1a1a1a; background: #000; overflow: hidden; }
        #wheel-fill { position: absolute; bottom: 0; width: 100%; background: var(--accent); transition: height 0.6s ease-out; }
        #cursor-wrapper { position: absolute; inset: 0; z-index: 20; transition: transform 0.1s linear; }
        #cursor-line { position: absolute; top: 5px; left: 50%; width: 6px; height: 30px; background: #fff; border-radius: 10px; transform: translateX(-50%); box-shadow: 0 0 15px #fff; }
        .center-stat { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 5; pointer-events: none; }
        #status-msg { height: 30px; font-size: 1.4rem; font-weight: 900; margin-top: 5px; }
        .win-glow { color: var(--win) !important; text-shadow: 0 0 15px var(--win); }
        .loss-glow { color: var(--loss) !important; text-shadow: 0 0 15px var(--loss); }
        .btn-row { display: flex; width: 100%; gap: 8px; margin-bottom: 8px; }
        .opt-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 10px; flex: 1; font-weight: bold; }
        .opt-btn.active { background: var(--accent); border-color: #fff; }
        .action-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius); color: #fff; font-size: 1.1rem; font-weight: 900; margin: 10px 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; padding-bottom: 20px; }
        .item-frame { border: 1px solid #222; border-radius: var(--radius); padding: 15px; background: var(--panel); text-align: center; }
        .item-frame.selected { border-color: var(--accent); background: #1e0a2e; }
        .price { color: var(--win); font-weight: bold; }
        .stats-list { background: var(--panel); border-radius: var(--radius); padding: 15px; border: 1px solid #222; margin-bottom: 15px; }
    </style>
</head>
<body>
    <header>
        <div onclick="showPage('shop')" style="cursor:pointer">🛒</div>
        <div class="header-logo" onclick="showPage('main')">ОПГРЕЙДОР</div>
        <div class="balance-box"><span id="bal">0</span> ₴ <div onclick="showPage('profile')" style="cursor:pointer">👤</div></div>
    </header>

    <main>
        <div id="p-main" class="container" style="display: block;">
            <div class="wheel-container">
                <canvas id="p-canvas" style="position:absolute; inset:0; z-index:10"></canvas>
                <div id="wheel-fill" style="height: 10%;"></div>
                <div id="cursor-wrapper"><div id="cursor-line"></div></div>
                <div class="center-stat">
                    <h2 id="pct-view" style="font-size: 2.8rem; font-weight: 900;">10%</h2>
                    <div id="status-msg"></div>
                </div>
            </div>
            <div class="btn-row">
                <button class="opt-btn bc" id="m2" onclick="setM(2, 'm2')">X2</button>
                <button class="opt-btn bc" id="m4" onclick="setM(4, 'm4')">X4</button>
                <button class="opt-btn bc" id="m10" onclick="setM(10, 'm10')">X10</button>
            </div>
            <button class="action-btn" id="go-btn" onclick="startSpin()">ПРОКАЧАТЬ</button>
            <div id="inv-main" class="grid"></div>
        </div>

        <div id="p-shop" class="container">
            <input type="number" id="budget" placeholder="Цена от..." style="width:100%; padding:12px; background:#000; border:1px solid #333; color:#fff; border-radius:8px; margin-bottom:10px;">
            <button class="opt-btn" style="width:100%; margin-bottom:15px" onclick="refreshShop()">ОБНОВИТЬ</button>
            <div id="shop-grid" class="grid"></div>
            <button class="action-btn" onclick="buySelected()">КУПИТЬ</button>
        </div>

        <div id="p-profile" class="container">
            <div id="stat-box" class="stats-list"></div>
            <button class="opt-btn" style="width:100%" onclick="sellAll()">ПРОДАТЬ ВСЁ</button>
            <div id="inv-prof" class="grid" style="margin-top:15px"></div>
        </div>
    </main>

    <script>
        let user = JSON.parse(localStorage.getItem('upg_v12')) || { bal: 1000, inv: [{id:1, n:"Твои яйца", p:100}], stats: { ups: 0, lost: 0, earned: 0, best: {n:"-", p:0} } };
        let chance = 10, selected = new Set(), spinning = false, curRot = 0;

        function update() {
            document.getElementById('bal').innerText = Math.floor(user.bal);
            renderInv('inv-main', true);
            renderInv('inv-prof', false);
            renderStats();
            localStorage.setItem('upg_v12', JSON.stringify(user));
        }

        function renderStats() {
            document.getElementById('stat-box').innerHTML = `<p>Сделок: ${user.stats.ups}</p><p>Прибыль: ${user.stats.earned} ₴</p><p>Топ: ${user.stats.best.n} (${user.stats.best.p} ₴)</p>`;
        }

        function renderInv(id, single) {
            const g = document.getElementById(id); if(!g) return;
            g.innerHTML = '';
            user.inv.forEach(i => {
                const d = document.createElement('div');
                d.className = `item-frame ${selected.has(i.id) ? 'selected' : ''}`;
                d.innerHTML = `<b>${i.n}</b><div class="price">${i.p} ₴</div>`;
                d.onclick = () => { if(single) selected.clear(); if(selected.has(i.id)) selected.delete(i.id); else selected.add(i.id); update(); };
                g.appendChild(d);
            });
        }

        function setM(m, id) {
            chance = Math.floor(100/m);
            document.getElementById('wheel-fill').style.height = chance + '%';
            document.getElementById('pct-view').innerText = chance + '%';
            document.querySelectorAll('.bc').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startSpin() {
            if(spinning || selected.size !== 1) return;
            spinning = true; document.getElementById('go-btn').disabled = true;
            const item = user.inv.find(x => x.id === [...selected][0]);
            let start = null, dur = 3000, rot = 1440 + Math.random()*360, sAng = curRot;
            function anim(now) {
                if(!start) start = now;
                let t = Math.min((now - start)/dur, 1);
                let ease = 1 - Math.pow(1 - t, 4);
                curRot = sAng + (ease * rot);
                document.getElementById('cursor-wrapper').style.transform = `rotate(${curRot}deg)`;
                if(t < 1) requestAnimationFrame(anim);
                else finish(curRot % 360, item);
            }
            requestAnimationFrame(anim);
        }

        function finish(deg, item) {
            spinning = false; document.getElementById('go-btn').disabled = false;
            // ЖЕСТКАЯ ПРОВЕРКА (С запасом в 6 градусов для компенсации лагов)
            const winSize = (chance / 100) * 360;
            const start = 180 - (winSize / 2) - 6;
            const end = 180 + (winSize / 2) + 6;
            const win = (deg >= start && deg <= end);

            const msg = document.getElementById('status-msg');
            if(win) {
                let p = Math.floor(item.p * (100/chance)) - item.p;
                item.p += p; item.n = "★ " + item.n.replace("★ ", "");
                user.stats.earned += p;
                if(item.p > user.stats.best.p) user.stats.best = {n:item.n, p:item.p};
                msg.innerText = "ПОБЕДА"; msg.className = "win-glow";
            } else {
                user.stats.lost += item.p; user.inv = user.inv.filter(x => x.id !== item.id);
                msg.innerText = "НЕ БЕДА"; msg.className = "loss-glow";
            }
            user.stats.ups++; selected.clear(); update();
        }

        function showPage(p) { 
            ['main','shop','profile'].forEach(x => document.getElementById('p-'+x).style.display='none');
            document.getElementById('p-'+p).style.display='block';
        }

        let sItems = [];
        function refreshShop() {
            const b = parseInt(document.getElementById('budget').value) || 50;
            sItems = Array.from({length:4}, (_,i)=>({id:'s'+i, n:["Зуб","Мозг","Почка","Заначка"][i], p:Math.floor(b+Math.random()*b*0.3)}));
            const g = document.getElementById('shop-grid'); g.innerHTML = '';
            sItems.forEach(i => {
                const d = document.createElement('div'); d.className = 'item-frame';
                d.innerHTML = `<b>${i.n}</b><div class="price">${i.p} ₴</div>`;
                d.onclick = () => { i.sel = !i.sel; d.classList.toggle('selected'); };
                g.appendChild(d);
            });
        }
        function buySelected() {
            sItems.forEach(i => { if(i.sel && user.bal >= i.p) { user.bal -= i.p; user.inv.push({...i, id:Date.now()+Math.random()}); }});
            showPage('main'); update();
        }
        function sellAll() { user.inv.forEach(i => user.bal += i.p); user.inv = []; update(); }
        
        update();
    </script>
</body>
</html>
